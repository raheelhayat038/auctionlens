<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuctionLens PK - AI Verifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center py-10 px-4">

    <h1 class="text-3xl font-bold text-blue-400 mb-8 tracking-tighter">AUCTIONLENS PK</h1>

    <div class="max-w-xl w-full bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-2xl">
        <div id="drop-zone" class="w-full h-64 rounded-2xl border-2 border-dashed border-slate-700 bg-slate-800/50 flex flex-col items-center justify-center mb-6 overflow-hidden relative">
            <img id="preview-img" class="hidden absolute inset-0 w-full h-full object-contain p-2" />
            <p id="prompt-text" class="text-slate-500 text-sm font-medium text-center">Scan or Upload<br>Japanese Auction Sheet</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <label class="bg-blue-600 text-center py-4 rounded-xl font-bold cursor-pointer hover:bg-blue-500 transition-all">
                UPLOAD <input type="file" id="file-input" accept="image/*" class="hidden">
            </label>
            <label class="bg-emerald-600 text-center py-4 rounded-xl font-bold cursor-pointer hover:bg-emerald-500 transition-all">
                CAMERA <input type="file" id="camera-input" accept="image/*" capture="camera" class="hidden">
            </label>
        </div>

        <div id="result-area" class="hidden">
            <div class="h-px bg-slate-800 w-full my-6"></div>
            <h3 class="text-emerald-400 font-bold text-xs uppercase tracking-widest mb-3 text-center">AI Analysis Report</h3>
            <div id="ai-text" class="text-sm text-slate-300 leading-relaxed whitespace-pre-wrap bg-black/30 p-5 rounded-xl border border-slate-800 min-h-[100px]">
                Analyzing...
            </div>
        </div>
    </div>

    <p class="mt-8 text-slate-600 text-xs">© 2026 AuctionLens PK | Secure Verification</p>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // 1. API KEY (Ensure this is restricted in Google Cloud Console)
        const API_KEY = "AIzaSyCKTuHqNFv01tXzsYNJyBh4uYMxmDpbOqg";  

        // 2. Setup AI with v1 API Version
        const genAI = new GoogleGenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ 
            model: "gemini-1.5-flash",
            apiVersion: "v1" 
        });

        const fileInput = document.getElementById('file-input');
        const cameraInput = document.getElementById('camera-input');
        const aiText = document.getElementById('ai-text');
        const resultArea = document.getElementById('result-area');
        const previewImg = document.getElementById('preview-img');
        const promptText = document.getElementById('prompt-text');

        async function processImage(file) {
            if (!file) return;

            // Show Result Area and Reset Text
            resultArea.classList.remove('hidden');
            aiText.innerText = "Reading Auction Sheet... 🔍";
            
            // Image Preview Logic
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                previewImg.classList.remove('hidden');
                promptText.classList.add('hidden');
            };
            reader.readAsDataURL(file);

            try {
                // Convert Image to Base64
                const base64Data = await new Promise((resolve) => {
                    const r = new FileReader();
                    r.onloadend = () => resolve(r.result.split(',')[1]);
                    r.readAsDataURL(file);
                });

                // The Analysis Prompt
                const prompt = `Act as a Japanese Auto Expert. 
                1. Extract the Chassis Number and Auction Grade.
                2. Translate the inspector's notes/comments into English and simple Urdu.
                3. Check the car diagram for 'W' (repair) or 'XX' (replacement) marks. 
                4. If the Grade is 4, 4.5, or 5 BUT there are W or XX marks, explicitly write 'SCAM ALERT' in Urdu.`;

                const result = await model.generateContent([
                    prompt,
                    { inlineData: { data: base64Data, mimeType: file.type } }
                ]);

                // Display the AI Result
                aiText.innerText = result.response.text();
            } catch (error) {
                console.error(error);
                aiText.innerText = "Error: " + error.message;
            }
        }

        // Event Listeners for both Upload and Camera
        fileInput.addEventListener('change', (e) => processImage(e.target.files[0]));
        cameraInput.addEventListener('change', (e) => processImage(e.target.files[0]));
    </script>
</body>
</html>
