<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUCTIONLENS PK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background-color: #020617; } </style>
</head>
<body class="text-slate-200 min-h-screen p-4 font-sans flex flex-col items-center">

    <h1 class="text-xl font-black text-blue-500 italic uppercase mb-6 tracking-tighter">AuctionLens PK</h1>

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-5 shadow-2xl mb-4">
        <div class="relative border-2 border-dashed border-slate-800 rounded-2xl aspect-[3/4] flex items-center justify-center overflow-hidden bg-slate-950 mb-4">
            <img id="previewImg" class="absolute inset-0 w-full h-full object-contain hidden z-10">
            <video id="video" autoplay playsinline class="absolute inset-0 w-full h-full object-cover hidden z-10"></video>
            <p id="placeholderText" class="text-slate-500 text-xs text-center p-4">Align Auction Sheet within this frame</p>
            <button id="shutter" class="absolute bottom-6 z-20 w-16 h-16 bg-white rounded-full border-4 border-red-500 hidden active:scale-90 transition-transform"></button>
        </div>
        
        <div class="grid grid-cols-2 gap-2 mb-2">
            <label class="bg-blue-600 py-4 rounded-xl text-center font-bold text-[10px] uppercase cursor-pointer">Upload <input type="file" id="fileIn" class="hidden"></label>
            <button id="btnCam" class="bg-emerald-600 py-4 rounded-xl font-bold text-[10px] uppercase">Open Camera</button>
        </div>
        <button id="analyze" class="hidden w-full bg-white text-black font-black py-4 rounded-xl text-[10px] uppercase tracking-widest">Process Sheet</button>
    </div>

    <button id="openLegend" class="w-full max-w-md py-3 bg-slate-800/50 border border-slate-700 rounded-xl text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-6">📖 View Diagram Code Legend</button>

    <div id="result" class="hidden w-full max-w-md space-y-3 pb-10">
        <button id="downloadBtn" class="w-full bg-slate-800 hover:bg-slate-700 text-white py-3 rounded-2xl mb-2 flex items-center justify-center gap-2 border border-slate-700 transition-all active:scale-95">
    <span>📥 Save Report as Image</span>
</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="features.js"></script>
        <div class="bg-slate-900 rounded-3xl border border-slate-800 p-5 space-y-4 shadow-2xl">
            <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                <span class="text-blue-500 font-bold text-[10px] uppercase tracking-widest">Expert Report</span>
                <span id="flagStatus" class="hidden bg-red-600 text-[8px] px-2 py-0.5 rounded text-white font-bold animate-pulse">ALERT</span>
            </div>
            
            <div class="grid grid-cols-3 gap-2">
                <div class="bg-black/40 p-2 rounded-lg border border-white/5 text-center">
                    <p class="text-[7px] text-slate-500 uppercase">Year</p>
                    <p id="resYear" class="text-xs font-bold text-white">-</p>
                </div>
                <div class="bg-black/40 p-2 rounded-lg border border-white/5 text-center">
                    <p class="text-[7px] text-slate-500 uppercase">Grade</p>
                    <p id="resGrade" class="text-xs font-bold text-white">-</p>
                </div>
                <div class="bg-black/40 p-2 rounded-lg border border-white/5 text-center">
                   <p id="resChassis" class="text-[9px] font-bold text-blue-400 truncate">-</p>
                      <p id="resChassis" class="text-[9px] font-bold text-blue-400 break-all pb-1">-</p>
                </div>
            </div>

            <div class="space-y-3 text-[11px] leading-relaxed text-slate-300">
                <div><p class="text-[8px] text-blue-400 font-bold uppercase mb-1">Executive Summary</p><p id="resSummary"></p></div>
                <div><p class="text-[8px] text-emerald-400 font-bold uppercase mb-1">Interior Notes</p><p id="resInterior"></p></div>
                <div><p class="text-[8px] text-orange-400 font-bold uppercase mb-1">Exterior & Marks</p><p id="resExterior"></p></div>
            </div>

            <div id="verdictBox" class="p-4 rounded-xl border-2 text-center transition-all">
                <p id="resVerdict" class="text-xs font-black uppercase tracking-wider"></p>
            </div>

            <button id="whatsappBtn" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white py-4 rounded-2xl flex items-center justify-center gap-3 transition-all shadow-lg active:scale-95">
                <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                <span class="font-bold text-xs uppercase tracking-tighter">Request Human Expert Review</span>
            </button>
        </div>
    </div>

    <div id="legendModal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 hidden flex items-center justify-center p-6">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-xs shadow-2xl">
            <h3 class="text-blue-500 font-black text-xs uppercase mb-4 tracking-widest border-b border-slate-800 pb-2">Code Legend</h3>
            <div class="grid grid-cols-2 gap-y-3 gap-x-4 text-[10px] text-slate-300">
                <p><b>A:</b> Scratch</p><p><b>U:</b> Dent</p>
                <p><b>W:</b> Repaint</p><p><b>S:</b> Rust</p>
                <p><b>C:</b> Corrosion</p><p><b>P:</b> Faded</p>
                <p><b>XX:</b> Replaced</p><p><b>X:</b> Needs Replacement</p>
            </div>
            <button id="closeLegend" class="w-full mt-6 py-3 bg-white text-black font-black rounded-xl text-[10px]">CLOSE</button>
        </div>
    </div>

    <script src="chat.js"></script>

<nav class="fixed bottom-0 left-0 right-0 h-16 bg-slate-950 border-t border-slate-900 flex justify-around items-center z-50">
    <a href="index.html" class="flex flex-col items-center gap-1 text-blue-500">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
        <span class="text-[9px] font-bold uppercase tracking-widest">Scanner</span>
    </a>

    <a href="https://afriditrading.com/" target="_blank" class="flex flex-col items-center gap-1 text-slate-500 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
        <span class="text-[9px] font-bold uppercase tracking-widest">Live Auctions</span>
    </a>
</nav>
