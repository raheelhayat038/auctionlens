<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AuctionLens PK | AI Car Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans flex flex-col items-center py-8">

    <div id="viewScanner" class="w-full max-w-md px-4 flex flex-col items-center gap-6">
        <div class="text-center">
            <h1 class="text-blue-500 font-black italic text-3xl uppercase tracking-tighter">AuctionLens PK</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.2em] font-bold">Auction Sheet AI</p>
        </div>
        <div class="relative w-full aspect-[4/3] bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden shadow-2xl">
            <video id="video" class="absolute inset-0 w-full h-full object-cover hidden" autoplay playsinline></video>
            <img id="previewImg" class="absolute inset-0 w-full h-full object-cover hidden" />
            <div id="placeholderText" class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center">
                <p class="text-sm font-bold text-slate-400">Scan Auction Sheet</p>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-3 w-full">
            <button id="btnCam" class="bg-slate-900 border border-slate-800 py-4 rounded-2xl text-[10px] font-black uppercase text-blue-500">Camera</button>
            <label class="bg-slate-900 border border-slate-800 py-4 rounded-2xl text-[10px] font-black uppercase text-blue-500 text-center cursor-pointer">
                <input type="file" id="fileIn" class="hidden" accept="image/*">Gallery
            </label>
        </div>
        <button id="shutter" class="hidden w-full bg-white text-black font-black py-4 rounded-2xl uppercase">Capture</button>
        <button id="analyze" class="hidden w-full bg-blue-600 text-white font-black py-4 rounded-2xl uppercase">Process Sheet</button>
        <div id="result" class="hidden w-full bg-slate-900 rounded-3xl p-6 border border-slate-800 mb-24">
            <p id="resVerdict" class="font-black italic text-center text-blue-500 uppercase mb-4"></p>
            <p class="text-[10px] text-slate-500">Chassis: <span id="resChassis" class="text-white"></span></p>
            <p class="text-[10px] text-slate-500">Grade: <span id="resGrade" class="text-white"></span></p>
        </div>
    </div>

    <div id="viewParts" class="hidden w-full max-w-md px-4 pb-24 flex flex-col gap-6">
        <div class="text-center">
            <h2 class="text-emerald-500 font-black italic text-2xl uppercase tracking-tighter">Part Finder</h2>
            <p class="text-slate-400 text-xs mt-1">Photo the part, AI finds the name</p>
        </div>
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 text-center space-y-4">
             <div class="w-16 h-16 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto text-emerald-500">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
            </div>
            <p class="text-sm text-slate-300">Feature Coming Soon: Use the Contact form below to send part photos directly to our WhatsApp!</p>
            <button onclick="document.getElementById('navContact').click()" class="w-full bg-emerald-600 text-white font-black py-4 rounded-2xl uppercase">Contact Parts Dept</button>
        </div>
    </div>

    <div id="viewContact" class="hidden w-full max-w-md px-4 pb-24 mx-auto flex flex-col gap-6">
        <div class="text-center"><h2 class="text-blue-500 font-black italic text-2xl uppercase">Contact Us</h2></div>
        <form id="leadForm" class="space-y-4">
            <input type="text" id="leadName" required placeholder="Name" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm text-white">
            <input type="tel" id="leadPhone" required placeholder="WhatsApp" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm text-white">
            <textarea id="leadMessage" rows="3" placeholder="I need a part for my..." class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm text-white"></textarea>
            <button type="submit" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase">Send to WhatsApp</button>
        </form>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-slate-950 border-t border-slate-900 flex justify-around items-center z-50 px-2">
        <button id="navScanner" class="flex flex-col items-center gap-1 text-blue-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
            <span class="text-[7px] font-bold uppercase">Scanner</span>
        </button>
        <button id="navParts" class="flex flex-col items-center gap-1 text-slate-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
            <span class="text-[7px] font-bold uppercase">Parts</span>
        </button>
        <a href="https://afriditrading.com/cars" target="_blank" class="flex flex-col items-center gap-1 text-slate-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            <span class="text-[7px] font-bold uppercase">Auctions</span>
        </a>
        <button id="navContact" class="flex flex-col items-center gap-1 text-slate-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
            <span class="text-[7px] font-bold uppercase">Contact</span>
        </button>
    </nav>

    <script src="chat.js"></script>
</body>
</html>
