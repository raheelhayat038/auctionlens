<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AuctionLens PK</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans flex flex-col items-center py-8">

    <div id="viewScanner" class="w-full max-w-md px-4 flex flex-col items-center gap-6">
        <div class="text-center">
            <h1 class="text-blue-500 font-black italic text-3xl uppercase tracking-tighter">AuctionLens PK</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.2em] font-bold">AI Sheet Analysis</p>
        </div>

        <div class="relative w-full aspect-[3/4] bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden shadow-2xl">
            <video id="video" class="absolute inset-0 w-full h-full object-cover hidden" autoplay playsinline></video>
            <img id="previewImg" class="absolute inset-0 w-full h-full object-cover hidden" />
            <div id="placeholderText" class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center">
                <p class="text-sm font-bold text-slate-400">Scan Auction Sheet</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 w-full">
            <button id="btnCam" class="bg-slate-900 border border-slate-800 py-4 rounded-2xl text-[10px] font-black uppercase text-blue-500">Camera</button>
            <label for="fileIn" class="bg-slate-900 border border-slate-800 py-4 rounded-2xl text-[10px] font-black uppercase text-blue-500 text-center cursor-pointer">
                <span>Gallery</span>
                <input type="file" id="fileIn" class="hidden" accept="image/*">
            </label>
        </div>

        <button id="shutter" class="hidden w-full bg-white text-black font-black py-5 rounded-2xl uppercase">Capture Photo</button>
        <button id="analyze" class="hidden w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase shadow-lg">Process Image</button>

        <div id="result" class="hidden w-full bg-slate-900 rounded-3xl p-6 border border-slate-800 mb-28 space-y-4">
            <div id="verdictBox" class="p-4 rounded-xl border-2 text-center bg-slate-950">
                <p id="resVerdict" class="font-black italic text-lg uppercase"></p>
            </div>
            <div class="grid grid-cols-3 gap-2 text-center">
                <div class="bg-slate-950 p-2 rounded-lg border border-slate-800"><p class="text-[7px] text-slate-500 uppercase">Year</p><p id="resYear" class="text-xs font-bold text-white">-</p></div>
                <div class="bg-slate-950 p-2 rounded-lg border border-slate-800"><p class="text-[7px] text-slate-500 uppercase">Grade</p><p id="resGrade" class="text-xs font-bold text-white">-</p></div>
                <div class="bg-slate-950 p-2 rounded-lg border border-slate-800"><p class="text-[7px] text-slate-500 uppercase">Int</p><p id="resInterior" class="text-xs font-bold text-white">-</p></div>
            </div>
            <div class="bg-slate-950 p-3 rounded-lg border border-slate-800">
                <p class="text-[8px] text-slate-500 uppercase font-bold">Chassis</p>
                <p id="resChassis" class="text-sm font-bold text-white">-</p>
            </div>
            <div class="bg-slate-950 p-3 rounded-lg border border-slate-800">
                <p class="text-[8px] text-slate-500 uppercase font-bold">Summary</p>
                <p id="resSummary" class="text-[11px] text-slate-300">-</p>
            </div>
            <button id="whatsappReport" class="w-full bg-[#25D366] text-white font-black py-4 rounded-xl uppercase text-[10px]">Expert Review</button>
        </div>
    </div>

    <div id="viewParts" class="hidden w-full max-w-md px-4 pb-24 text-center space-y-6">
        <h2 class="text-emerald-500 font-black italic text-2xl uppercase pt-10">Part Finder</h2>
        <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800">
            <p class="text-sm text-slate-400 mb-6">Take a photo of any car part to identify it.</p>
            <button onclick="document.getElementById('navContact').click()" class="w-full bg-emerald-600 text-white font-black py-4 rounded-2xl uppercase">Contact Parts Dept</button>
        </div>
    </div>

    <div id="viewContact" class="hidden w-full max-w-md px-4 pb-24 mx-auto flex flex-col gap-6">
        <h2 class="text-blue-500 font-black italic text-2xl uppercase text-center pt-10">Contact Us</h2>
        <form id="leadForm" class="space-y-4">
            <input type="text" id="leadName" required placeholder="Name" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-white">
            <textarea id="leadMessage" rows="3" placeholder="Message..." class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-white"></textarea>
            <button type="submit" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase">Send WhatsApp</button>
        </form>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-slate-950 border-t border-slate-800 flex justify-around items-center z-50">
        <button id="navScanner" class="flex flex-col items-center text-blue-500"><span class="text-[8px] font-bold">SCANNER</span></button>
        <button id="navParts" class="flex flex-col items-center text-slate-500"><span class="text-[8px] font-bold">PARTS</span></button>
        <button id="navContact" class="flex flex-col items-center text-slate-500"><span class="text-[8px] font-bold">CONTACT</span></button>
    </nav>

    <script src="chat.js"></script>
</body>
</html>
