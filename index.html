<div class="bg-slate-900 rounded-3xl border border-slate-800 p-6 shadow-2xl space-y-4">
    <div class="flex justify-between items-center border-b border-slate-800 pb-3">
        <h2 class="text-blue-500 font-black italic text-xs tracking-widest uppercase">Full Vehicle Report</h2>
        <span id="flagStatus" class="hidden bg-red-600 text-[9px] font-black px-2 py-1 rounded text-white italic animate-pulse">TAMPER ALERT</span>
    </div>

    <div class="grid grid-cols-3 gap-2">
        <div class="bg-slate-950 p-3 rounded-xl border border-slate-800/50 text-center">
            <p class="text-slate-500 text-[7px] uppercase font-bold mb-1">Year</p>
            <p id="resYear" class="text-sm font-black text-white">-</p>
        </div>
        <div class="bg-slate-950 p-3 rounded-xl border border-slate-800/50 text-center">
            <p class="text-slate-500 text-[7px] uppercase font-bold mb-1">Make</p>
            <p id="resMake" class="text-sm font-black text-white">-</p>
        </div>
        <div class="bg-slate-950 p-3 rounded-xl border border-slate-800/50 text-center">
            <p class="text-slate-500 text-[7px] uppercase font-bold mb-1">Model</p>
            <p id="resModel" class="text-sm font-black text-white truncate">-</p>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3">
        <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800/50 text-center">
            <p class="text-slate-500 text-[8px] uppercase font-bold mb-1">Auction Grade</p>
            <p id="resGrade" class="text-2xl font-black text-white">-</p>
        </div>
        <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800/50 text-center">
            <p class="text-slate-500 text-[8px] uppercase font-bold mb-1">Chassis</p>
            <p id="resChassis" class="text-xs font-mono text-blue-400 truncate">-</p>
        </div>
    </div>

    <div class="space-y-3">
        <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800/50">
            <p class="text-emerald-500 text-[8px] uppercase font-bold mb-2">Inspector Notes Summary</p>
            <div id="resNotes" class="text-xs text-slate-300 leading-relaxed font-medium"></div>
        </div>
        <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800/50">
            <p class="text-orange-400 text-[8px] uppercase font-bold mb-2">Diagram Damage Marks</p>
            <div id="resDiagram" class="text-xs text-slate-300 italic font-medium leading-relaxed"></div>
        </div>
    </div>
</div>
