<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auction Sheet AI Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto space-y-6">
        <header class="text-center">
            <h1 class="text-3xl font-bold text-blue-400">Auction Sheet AI</h1>
            <p class="text-slate-400">Extract Grade, Chassis, and Damage via Llama 4</p>
        </header>

        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl">
            <div class="flex flex-wrap gap-4 justify-center mb-6">
                <button id="openCamera" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-lg font-semibold transition">
                    📸 Open Camera
                </button>
                <label class="bg-slate-700 hover:bg-slate-600 px-6 py-2 rounded-lg font-semibold cursor-pointer transition">
                    📁 Upload Image
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                </label>
            </div>

            <div id="cameraContainer" class="hidden relative rounded-lg overflow-hidden bg-black aspect-video mb-4">
                <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
                <button id="captureBtn" class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-red-600 p-4 rounded-full border-4 border-white shadow-lg"></button>
            </div>

            <div id="previewContainer" class="hidden space-y-4">
                <img id="imagePreview" src="" class="w-full rounded-lg border border-slate-600 shadow-md">
                <button id="analyzeBtn" class="w-full bg-green-600 hover:bg-green-500 py-3 rounded-lg font-bold text-lg transition">
                    Analyze Auction Sheet
                </button>
            </div>
        </div>

        <div id="resultBox" class="hidden bg-slate-800 p-6 rounded-xl border border-blue-500/30">
            <h2 class="text-xl font-semibold mb-3 text-blue-300">AI Analysis</h2>
            <div id="aiResponse" class="text-slate-200 whitespace-pre-wrap leading-relaxed">
                Processing...
            </div>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
