<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auction AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen p-4 font-sans">
    <div class="max-w-md mx-auto space-y-4">
        <header class="flex justify-between items-center bg-slate-800/50 p-3 rounded-xl border border-slate-700">
            <h1 class="text-lg font-bold text-blue-400">Auction Scouter</h1>
            <div class="flex gap-2">
                <button id="btnCam" class="text-xs bg-blue-600 px-3 py-1.5 rounded-lg font-medium">📸 Cam</button>
                <label class="text-xs bg-slate-700 px-3 py-1.5 rounded-lg font-medium cursor-pointer">
                    📁 File <input type="file" id="fileIn" class="hidden" accept="image/*">
                </label>
            </div>
        </header>

        <div id="camBox" class="hidden rounded-xl overflow-hidden bg-black relative aspect-[4/3]">
            <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
            <button id="shutter" class="absolute bottom-4 left-1/2 -translate-x-1/2 w-12 h-12 bg-white rounded-full border-4 border-red-500"></button>
        </div>

        <div id="previewBox" class="hidden space-y-3">
            <div class="relative rounded-xl overflow-hidden border border-slate-700 shadow-lg">
                <img id="previewImg" class="w-full h-48 object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
            </div>
            <button id="analyze" class="w-full bg-blue-500 hover:bg-blue-400 py-3 rounded-xl font-bold text-sm uppercase tracking-wider transition">Analyze Sheet</button>
        </div>

        <div id="result" class="hidden animate-in fade-in duration-500">
            <div class="bg-slate-800 rounded-xl border border-blue-500/20 overflow-hidden shadow-2xl">
                <div class="bg-blue-500/10 px-4 py-2 border-b border-blue-500/20">
                    <span class="text-[10px] uppercase font-bold text-blue-400 tracking-widest">Inspection Report</span>
                </div>
                <div id="outputText" class="p-4 text-sm leading-relaxed whitespace-pre-wrap"></div>
            </div>
        </div>
    </div>
    <script src="chat.js"></script>
</body>
</html>
