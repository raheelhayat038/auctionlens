<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 1.5 Flash Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 800px; margin: 0 auto; }
        #output { background: #f4f4f4; padding: 15px; border-radius: 8px; white-space: pre-wrap; margin-top: 20px; border: 1px solid #ddd; }
        button { padding: 10px 20px; background-color: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { background-color: #ccc; }
        input { padding: 10px; width: 300px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

    <h2>Gemini 1.5 Flash AI</h2>
    <input type="text" id="promptInput" placeholder="Enter your question here..." value="Explain quantum physics to a cat.">
    <button id="submitBtn">Ask Gemini</button>

    <div id="output">Response will appear here...</div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // --- CONFIGURATION ---
        const API_KEY = "AIzaSyC0Kh8L5kN1NqOA5L0NfmYVlMt4uZAFnTE"; // Replace with your real key
        const genAI = new GoogleGenerativeAI(API_KEY);
        
        // Using the stable model name
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        const btn = document.getElementById('submitBtn');
        const output = document.getElementById('output');
        const input = document.getElementById('promptInput');

        btn.addEventListener('click', async () => {
            const prompt = input.value;
            if (!prompt) return;

            btn.disabled = true;
            output.innerText = "Thinking...";

            try {
                // generateContent is the standard method for v1 and v1beta
                const result = await model.generateContent(prompt);
                const response = await result.response;
                const text = response.text();
                
                output.innerText = text;
            } catch (error) {
                console.error(error);
                output.innerHTML = `<span style="color:red">Error: ${error.message}</span>`;
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
