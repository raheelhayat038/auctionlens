<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AuctionLens PK | AI Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans flex flex-col items-center py-8">

    <div id="viewScanner" class="w-full max-w-md px-4 flex flex-col items-center gap-6">
        <div class="text-center">
            <h1 class="text-blue-500 font-black italic text-3xl uppercase tracking-tighter">AuctionLens PK</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.2em] font-bold">Expert AI Sheet Analysis</p>
        </div>

        <div class="relative w-full aspect-[3/4] bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden shadow-2xl">
            <video id="video" class="absolute inset-0 w-full h-full object-cover hidden" autoplay playsinline></video>
            <img id="previewImg" class="absolute inset-0 w-full h-full object-cover hidden" />
            <div id="placeholderText" class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center">
                <div class="w-16 h-16 bg-blue-600/10 rounded-full flex items-center justify-center mb-4 text-blue-500">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                </div>
                <p class="text-sm font-bold text-slate-400">Scan Auction Sheet</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 w-full">
            <button id="btnCam" class="bg-slate-900 border border-slate-800 py-4 rounded-2xl text-[10px] font-black uppercase text-blue-500">Camera</button>
            <label class="bg-slate-900 border border-slate-800 py-4 rounded-2xl text-[10px] font-black uppercase text-blue-500 text-center cursor-pointer">
                <input type="file" id="fileIn" class="hidden" accept="image/*">Gallery
            </label>
        </div>

        <button id="shutter" class="hidden w-full bg-white text-black font-black py-5 rounded-2xl uppercase">Capture Sheet</button>
        <button id="analyze" class="hidden w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase shadow-lg shadow-blue-900/40">Process Sheet</button>

        <div id="result" class="hidden w-full bg-slate-900 rounded-3xl p-6 border border-slate-800 mb-28 space-y-4">
            <div id="verdictBox" class="p-4 rounded-xl border-2 text-center bg-slate-950">
                <p id="resVerdict" class="font-black italic text-lg uppercase"></p>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <div class="bg-slate-950 p-2 rounded-lg border border-slate-800 text-center">
                    <p class="text-[7px] text-slate-500 uppercase font-bold">Year</p>
                    <p id="resYear" class="text-xs font-black text-white">-</p>
                </div>
                <div class="bg-slate-950 p-2 rounded-lg border border-slate-800 text-center">
                    <p class="text-[7px] text-slate-500 uppercase font-bold">Grade</p>
                    <p id="resGrade" class="text-xs font-black text-white">-</p>
                </div>
                <div class="bg-slate-950 p-2 rounded-lg border border-slate-800 text-center">
                    <p class="text-[7px] text-slate-500 uppercase font-bold">Int</p>
                    <p id="resInterior" class="text-xs font-black text-white">-</p>
                </div>
            </div>
            <div class="bg-slate-950 p-3 rounded-lg border border-slate-800">
                <p class="text-[8px] text-slate-500 uppercase font-bold mb-1">Chassis</p>
                <p id="resChassis" class="text-sm font-bold text-white">-</p>
            </div>
            <div class="bg-slate-950 p-3 rounded-lg border border-slate-800">
                <p class="text-[8px] text-slate-500 uppercase font-bold mb-1">AI Analysis</p>
                <p id="resSummary" class="text-[11px] text-slate-300 leading-tight">-</p>
            </div>
            <button id="whatsappReport" class="w-full bg-[#25D366] text-white font-black py-4 rounded-xl uppercase text-[10px]">Expert Opinion</button>
        </div>
    </div>

    <div id="viewParts" class="hidden w-full max-w-md px-4 pb-24 flex flex-col gap-6">
        <div class="text-center">
            <h2 class="text-emerald-500 font-black italic text-2xl uppercase">Part Finder</h2>
            <p class="text-slate-400 text-xs mt-1">Snap a part to find it in Pakistan</p>
        </div>
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 text-center space-y-6">
            <div class="w-20 h-20 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto text-emerald-500">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
            </div>
            <p class="text-sm text-slate-300">Take a clear photo of the part. We will identify it and find the best price for you.</p>
            <button onclick="document.getElementById('navContact').click()" class="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl uppercase shadow-lg shadow-emerald-900/20">Find Part Now</button>
        </div>
    </div>

    <div id="viewContact" class="hidden w-full max-w-md px-4 pb-24 mx-auto flex flex-col gap-6">
        <div class="text-center"><h2 class="text-blue-500 font-black italic text-2xl uppercase">Contact Us</h2></div>
        <form id="leadForm" class="space-y-4">
            <input type="text" id="leadName" required placeholder="Name" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm text-white focus:border-blue-500 outline-none">
            <input type="tel" id="leadPhone" required placeholder="WhatsApp Number" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm text-white focus:border-blue-500 outline-none">
            <textarea id="leadMessage" rows="3" placeholder="Explain your requirement..." class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm text-white focus:border-blue-500 outline-none"></textarea>
            <button type="submit" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase shadow-lg">Send Inquiry</button>
        </form>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-slate-950 border-t border-slate-900 flex justify-around items-center z-50">
        <button id="navScanner" class="flex flex-col items-center gap-1 text-blue-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
            <span class="text-[7px] font-bold uppercase">Scanner</span>
        </button>
        <button id="navParts" class="flex flex-col items-center gap-1 text-slate-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
            <span class="text-[7px] font-bold uppercase">Parts</span>
        </button>
        <a href="https://afriditrading.com/cars" target="_blank" class="flex flex-col items-center gap-1 text-slate-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            <span class="text-[7px] font-bold uppercase">Auctions</span>
        </a>
        <button id="navContact" class="flex flex-col items-center gap-1 text-slate-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
            <span class="text-[7px] font-bold uppercase">Contact</span>
        </button>
    </nav>

    <script src="chat.js"></script>
</body>
</html>
