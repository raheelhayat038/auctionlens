<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuctionLens PK</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body class="bg-slate-950 text-white flex flex-col items-center p-6">

<h1 class="text-3xl font-bold text-blue-400 mb-6">AuctionLens PK</h1>

<div class="bg-slate-900 p-6 rounded-2xl w-full max-w-xl">

    <!-- Upload -->
    <input type="file" id="fileInput" class="mb-4">

    <!-- Preview -->
    <img id="preview" class="hidden w-full mb-4 rounded-lg"/>

    <!-- Button -->
    <button id="analyzeBtn" class="bg-blue-600 px-4 py-2 rounded-lg w-full">
        Analyze Sheet
    </button>

    <!-- Result -->
    <div id="result" class="mt-4 text-sm whitespace-pre-wrap"></div>

    <!-- PDF -->
    <button id="pdfBtn" class="hidden mt-4 bg-green-600 px-4 py-2 rounded-lg w-full">
        Download PDF
    </button>

</div>

<script>

const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const analyzeBtn = document.getElementById("analyzeBtn");
const resultDiv = document.getElementById("result");
const pdfBtn = document.getElementById("pdfBtn");

let lastResult = "";

fileInput.onchange = () => {
    const file = fileInput.files[0];
    preview.src = URL.createObjectURL(file);
    preview.classList.remove("hidden");
};

analyzeBtn.onclick = async () => {

    const file = fileInput.files[0];
    if(!file) return alert("Upload image first");

    resultDiv.innerText = "Analyzing... 🔍";

    const base64 = await toBase64(file);

    const res = await fetch("/api/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            image: base64,
            mimeType: file.type
        })
    });

    const data = await res.json();

    const text = data.choices[0].message.content;

    lastResult = text;

    resultDiv.innerText = text;

    pdfBtn.classList.remove("hidden");
};

pdfBtn.onclick = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.text("AuctionLens PK Report", 10, 10);
    doc.text(lastResult, 10, 20);

    doc.save("auction-report.pdf");
};

function toBase64(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(",")[1]);
        reader.readAsDataURL(file);
    });
}

</script>

</body>
</html>
