<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AuctionLens PK</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex flex-col items-center py-8">

    <div id="viewScanner" class="w-full max-w-md px-4 flex flex-col gap-6">
        <h1 class="text-blue-500 font-black text-3xl italic text-center uppercase">AuctionLens PK</h1>
        
        <div class="relative w-full aspect-[3/4] bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden">
            <video id="video" class="absolute inset-0 w-full h-full object-cover hidden" autoplay playsinline></video>
            <img id="previewImg" class="absolute inset-0 w-full h-full object-cover hidden" />
            <div id="placeholder" class="absolute inset-0 flex items-center justify-center text-slate-500 text-sm">Upload Sheet</div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button id="btnCam" class="bg-slate-900 border border-slate-800 py-4 rounded-2xl text-blue-500 font-bold uppercase text-xs">Camera</button>
            <button id="btnGallery" class="bg-slate-900 border border-slate-800 py-4 rounded-2xl text-blue-500 font-bold uppercase text-xs">Gallery</button>
            <input type="file" id="fileIn" class="hidden" accept="image/*">
        </div>

        <button id="shutter" class="hidden w-full bg-white text-black font-black py-4 rounded-2xl uppercase">Capture</button>
        <button id="analyze" class="hidden w-full bg-blue-600 text-white font-black py-4 rounded-2xl uppercase">Process Sheet</button>

        <div id="result" class="hidden bg-slate-900 p-6 rounded-3xl border border-slate-800 mb-24">
            <div id="verdictBox" class="p-4 rounded-xl text-center mb-4 border border-blue-500 bg-blue-500/10 text-blue-500 font-black">
                <p id="resVerdict">READY</p>
            </div>
            <div class="space-y-1 text-xs">
                <p>Chassis: <span id="resChassis" class="text-white font-bold">-</span></p>
                <p>Grade: <span id="resGrade" class="text-white font-bold">-</span></p>
            </div>
        </div>
    </div>

    <div id="viewContact" class="hidden w-full max-w-md px-4 pt-10 text-center">
        <h2 class="text-blue-500 font-black text-2xl uppercase">Contact Us</h2>
        <p class="mt-4 text-slate-400">WhatsApp: +92 331 8484115</p>
    </div>

    <nav class="fixed bottom-0 inset-x-0 h-20 bg-slate-950 border-t border-slate-900 flex justify-around items-center z-50">
        <button id="navScanner" class="text-blue-500 text-[10px] font-bold uppercase">Scanner</button>
        <button id="navContact" class="text-slate-500 text-[10px] font-bold uppercase">Contact</button>
    </nav>

    <script src="chat.js"></script>
</body>
</html>
