#<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AuctionLens PK</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans flex flex-col items-center py-8">

    <div id="viewScanner" class="w-full max-w-md px-4 flex flex-col items-center gap-6">
        <div class="text-center">
            <h1 class="text-blue-500 font-black italic text-3xl uppercase tracking-tighter">AuctionLens PK</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.2em] font-bold">AI Auction Sheet Scanner</p>
        </div>

        <div class="relative w-full aspect-[3/4] bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden shadow-2xl">
            <video id="video" class="absolute inset-0 w-full h-full object-cover hidden" autoplay playsinline></video>
            <img id="previewImg" class="absolute inset-0 w-full h-full object-cover hidden" />
            
            <div id="placeholderText" class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center">
                <div class="w-16 h-16 bg-blue-600/10 rounded-full flex items-center justify-center mb-4 text-blue-500">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                </div>
                <p class="text-sm font-bold text-slate-400">Tap Below to Start</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 w-full">
            <button id="btnCam" class="bg-slate-900 border border-slate-800 py-4 rounded-2xl flex flex-col items-center gap-2 hover:bg-slate-800 transition-all">
                <span class="text-[10px] font-black uppercase text-blue-500">Camera</span>
            </button>
            <label class="bg-slate-900 border border-slate-800 py-4 rounded-2xl flex flex-col items-center gap-2 cursor-pointer hover:bg-slate-800 transition-all text-center">
                <input type="file" id="fileIn" class="hidden" accept="image/*">
                <span class="text-[10px] font-black uppercase text-blue-500">Gallery</span>
            </label>
        </div>

        <button id="shutter" class="hidden w-full bg-white text-black font-black py-5 rounded-2xl uppercase tracking-widest">Capture Sheet</button>
        <button id="analyze" class="hidden w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase tracking-widest shadow-lg">Process Sheet</button>

        <div id="result" class="hidden w-full bg-slate-900 rounded-3xl border border-slate-800 p-6 space-y-6 mb-24">
            <div id="verdictBox" class="p-4 rounded-xl border-2 text-center bg-slate-950">
                <p id="resVerdict" class="font-black italic text-lg uppercase"></p>
            </div>
            <div class="grid grid-cols-2 gap-4 pt-2">
                <div><p class="text-[9px] text-slate-500 uppercase font-bold">Grade</p><p id="resGrade" class="text-xl font-black text-white">-</p></div>
                <div><p class="text-[9px] text-slate-500 uppercase font-bold">Chassis</p><p id="resChassis" class="text-xl font-black text-white">-</p></div>
            </div>
            <button id="whatsappBtn" class="w-full bg-[#25D366] text-white font-black py-4 rounded-xl uppercase tracking-widest text-xs">Expert Review</button>
        </div>
    </div>

    <div id="viewContact" class="hidden w-full max-w-md px-4 pb-24 mx-auto flex flex-col gap-6">
        <div class="text-center pt-4">
            <h2 class="text-blue-500 font-black italic text-2xl uppercase">Get a Quote</h2>
            <p class="text-slate-400 text-xs">Direct Access to Auction Experts</p>
        </div>
        <form id="leadForm" class="space-y-4">
            <input type="text" id="leadName" required placeholder="Name" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm text-white focus:border-blue-500 outline-none">
            <input type="tel" id="leadPhone" required placeholder="WhatsApp (e.g. 0331...)" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm text-white focus:border-blue-500 outline-none">
            <textarea id="leadMessage" rows="3" placeholder="Car model & Budget" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm text-white focus:border-blue-500 outline-none"></textarea>
            <button type="submit" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase tracking-widest">Send Inquiry</button>
        </form>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-slate-950 border-t border-slate-900 flex justify-around items-center z-50">
        <button id="navScanner" class="flex flex-col items-center gap-1 text-blue-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
            <span class="text-[8px] font-bold uppercase">Scanner</span>
        </button>
        <button id="navContact" class="flex flex-col items-center gap-1 text-slate-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
            <span class="text-[8px] font-bold uppercase">Contact</span>
        </button>
    </nav>

    <script src="chat.js"></script>
</body>
</html>
