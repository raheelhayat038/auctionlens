<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auction AI Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4">
    <div class="max-w-xl mx-auto space-y-6">
        <header class="text-center py-6">
            <h1 class="text-3xl font-bold text-blue-400">Auction AI</h1>
            <p class="text-slate-400">Extracting Grade & Chassis Data</p>
        </header>

        <div class="flex gap-3 justify-center">
            <button id="btnCam" class="bg-blue-600 hover:bg-blue-500 px-5 py-2 rounded-lg font-medium transition">📸 Use Camera</button>
            <label class="bg-slate-700 hover:bg-slate-600 px-5 py-2 rounded-lg font-medium cursor-pointer transition">
                📁 Upload File
                <input type="file" id="fileIn" class="hidden" accept="image/*">
            </label>
        </div>

        <div id="camBox" class="hidden bg-black rounded-xl overflow-hidden shadow-2xl relative">
            <video id="video" autoplay playsinline class="w-full"></video>
            <button id="shutter" class="absolute bottom-4 left-1/2 -translate-x-1/2 w-14 h-14 bg-white rounded-full border-4 border-red-500 shadow-lg"></button>
        </div>

        <div id="previewBox" class="hidden space-y-4">
            <img id="previewImg" class="w-full rounded-xl border border-slate-700 shadow-md">
            <button id="analyze" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-xl font-bold text-lg shadow-lg transition">Analyze Auction Sheet</button>
        </div>

        <div id="result" class="hidden p-5 bg-slate-800 rounded-xl border border-blue-500/30">
            <h2 class="text-blue-400 font-bold mb-2">AI Analysis:</h2>
            <div id="outputText" class="text-sm whitespace-pre-wrap leading-relaxed text-slate-300">Processing...</div>
        </div>
    </div>
    <script src="chat.js"></script>
</body>
</html>
